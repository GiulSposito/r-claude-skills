name: Validate Skills

on:
  push:
    branches: [ main, develop ]
    paths:
      - '.claude/skills/**'
      - 'tests/**'
  pull_request:
    branches: [ main ]
    paths:
      - '.claude/skills/**'

jobs:
  validate:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup R
      uses: r-lib/actions/setup-r@v2
      with:
        r-version: '4.3.0'

    - name: Run validation script
      id: validate
      run: |
        chmod +x tests/validate-skills.sh
        ./tests/validate-skills.sh | tee validation-output.txt
      continue-on-error: true

    - name: Upload validation report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: validation-report
        path: validation-output.txt
        retention-days: 30

    - name: Check validation result
      if: steps.validate.outcome == 'failure'
      run: |
        echo "❌ Skill validation failed"
        cat validation-output.txt
        exit 1

    - name: Comment PR
      if: github.event_name == 'pull_request' && always()
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const output = fs.readFileSync('validation-output.txt', 'utf8');

          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: `## 🔍 Skill Validation Report\n\n\`\`\`\n${output}\n\`\`\``
          });
